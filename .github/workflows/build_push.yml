name: Build and Push

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'core/**'
      - 'buildSrc/**'
      - 'common.gradle'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'

jobs:
  build:
    name: Build release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build extensions
        uses: gradle/gradle-command-action@v2
        with:
          arguments: assembleRelease
